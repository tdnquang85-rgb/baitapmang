<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tim gia tri lon nhat trong mang</title>
</head>
<body>
    <h1 id="giatrilonnhat">gia tri lon nhat cua mang</h1>
    <script>
         let numbers= [3,50,1,3,2,10];
    let max=numbers[0];
    let index=0;
    for (let i=1; i<numbers.length; i++){
        if (numbers[i]>max){
            max=numbers[i];
            index=i;
        }
    }
    //  alert("max: "+max+" at position "+index);
    // document.write("max: "+max+" at position "+index);
   document.getElementById("giatrilonnhat").innerHTML="max: "+max+" at position "+index;

    </script>
   
</body>
</html>
